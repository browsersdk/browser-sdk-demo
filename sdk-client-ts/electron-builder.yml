appId: com.yunlogin.fbmain
productName: browser-sdk-client
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - "!sdk/"
  - "!extensions/"
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: browser-sdk-client
  # requestedExecutionLevel: requireAdministrator
  extraResources:
  - from: sdk/windows-x64/brosdk.dll
    to: sdk/windows-x64/brosdk.dll
  - from: sdk/windows-x64/.brosdk/cores/å
    to: sdk/windows-x64/.brosdk/cores/
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  # oneClick: false
mac:
  target: ["dmg", "zip"]
  # icon: build/icon.icns # 应用图标（放在build文件夹，也可改为根目录：./icon.icns）
  hardenedRuntime: true # 硬运行时（增强安全性）
  gatekeeperAssess: false
  # 修复权限文件路径：指向根目录的entitlements.mac.plist（关键！）
  entitlements: ./mac/entitlements.mac.plist
  entitlementsInherit: ./mac/entitlements.mac.plist
  # 可选：指定签名身份（匹配你的证书名称）
  identity: "Apple Development: fanis (5TNS742NKP)"
  minimumSystemVersion: 10.15
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # notarize: false
  extraResources:
  - from: sdk/arm64-osx/brosdk.dylib
    to: sdk/arm64-osx/brosdk.dylib
  - from: sdk/arm64-osx/.brosdk/cores/
    to: sdk/arm64-osx/.brosdk/cores/
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
